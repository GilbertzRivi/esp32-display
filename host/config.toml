[server]
host = "0.0.0.0"
port = 1234

[artifacts]
layout = "layout1.json"
theme = "theme1.json"

# ------------------------------------------------------------------
# BUILTIN
# ------------------------------------------------------------------

[[sources]]
placeholder = "cpu_usage"
kind = "builtin"
metric = "cpu_percent"
interval_ms = 1000

[[sources]]
placeholder = "ram_percent"
kind = "builtin"
metric = "ram_percent"
interval_ms = 2000

[[sources]]
placeholder = "ram_used"
kind = "builtin"
metric = "ram_used_gb"
interval_ms = 2000

[[sources]]
placeholder = "disk_percent"
kind = "builtin"
metric = "disk_percent"
interval_ms = 5000

[[sources]]
placeholder = "disk_used"
kind = "builtin"
metric = "disk_used_gb"
interval_ms = 5000

# ------------------------------------------------------------------
# SIMPLE TEXT VALUES
# ------------------------------------------------------------------

[[sources]]
placeholder = "host_name"
kind = "command"
mode = "shot"
command = "hostname"
interval_ms = 60000

[[sources]]
placeholder = "kernel_short"
kind = "command"
mode = "shot"
command = "uname -r | cut -c1-12"
interval_ms = 60000

[[sources]]
placeholder = "uptime_fmt"
kind = "command"
mode = "shot"
command = '''awk '{ s=$1; d=int(s/86400); h=int((s%86400)/3600); m=int((s%3600)/60); if (d>0) printf "%dd %02dh %02dm", d, h, m; else printf "%dh %02dm", h, m }' /proc/uptime'''
interval_ms = 10000

# ------------------------------------------------------------------
# CPU TEMP FROM ZENPOWER (via sensors)
# ------------------------------------------------------------------

[[sources]]
placeholder = "cpu_temp_c"
kind = "command"
mode = "shot"
command = '''
v=$(
  sensors 2>/dev/null | awk '
    BEGIN { z=0 }
    /zenpower/ { z=1 }
    z && /Tctl:|Tdie:/ {
      line=$0
      gsub(/[^0-9.+-]/, " ", line)
      n=split(line, a, / +/)
      for (i=1; i<=n; i++) {
        if (a[i] ~ /^[-+]?[0-9]+([.][0-9]+)?$/) {
          print int(a[i])
          exit
        }
      }
    }
  '
)
[ -n "$v" ] && printf "%s" "$v" || printf "0"
'''
interval_ms = 2000

# ------------------------------------------------------------------
# GPU DATA FROM AMDGPU
# updates: gpu_usage, gpu_temp_c, gpu_mem_used
# ------------------------------------------------------------------

[[sources]]
placeholder = "gpu_usage"
kind = "command"
mode = "shot"
command = '''
c=$(grep -l "DRIVER=amdgpu" /sys/class/drm/card*/device/uevent 2>/dev/null | head -n1)
c=${c%/device/uevent}
[ -n "$c" ] || c="/sys/class/drm/card0"

gpu_usage=$(cat "$c/device/gpu_busy_percent" 2>/dev/null)
[ -n "$gpu_usage" ] || gpu_usage=0

gpu_temp_raw=$(cat "$c"/device/hwmon/hwmon*/temp1_input 2>/dev/null | head -n1)
[ -n "$gpu_temp_raw" ] || gpu_temp_raw=0
gpu_temp_c=$((gpu_temp_raw / 1000))

gpu_mem_raw=$(cat "$c/device/mem_info_vram_used" 2>/dev/null)
[ -n "$gpu_mem_raw" ] || gpu_mem_raw=0
gpu_mem_used=$(awk -v n="$gpu_mem_raw" 'BEGIN { printf "%.1fG", n/1024/1024/1024 }')

printf '{"gpu_usage":"%s","gpu_temp_c":"%s","gpu_mem_used":"%s"}' \
  "$gpu_usage" "$gpu_temp_c" "$gpu_mem_used"
'''
interval_ms = 2000

# ------------------------------------------------------------------
# NETWORK DATA
# Superset of both configs:
# net_ip, net_rx, net_tx,
# net_iface, net_gateway, net_state, net_link,
# net_rx_bps, net_tx_bps, net_link_bps,
# net_rx_pct, net_tx_pct,
# net_graph_scale
# ------------------------------------------------------------------

[[sources]]
placeholder = "net_ip"
kind = "command"
mode = "shot"
command = '''
iface=$(ip route get 1.1.1.1 2>/dev/null | awk '/dev/ { for (i=1; i<=NF; i++) if ($i=="dev") { print $(i+1); exit } }')
[ -n "$iface" ] || iface=$(ls /sys/class/net 2>/dev/null | awk '$1 != "lo" { print; exit }')
[ -n "$iface" ] || iface="lo"

ip4=$(ip -4 addr show dev "$iface" 2>/dev/null | awk '/inet / {print $2; exit}' | cut -d/ -f1)
[ -n "$ip4" ] || ip4=$(hostname -I 2>/dev/null | awk '{ print $1 }')
[ -n "$ip4" ] || ip4="0.0.0.0"

gw=$(ip route show default 2>/dev/null | awk -v dev="$iface" '$1=="default" && $0 ~ ("dev " dev) {print $3; exit}')
[ -n "$gw" ] || gw="-"

state=$(cat "/sys/class/net/$iface/operstate" 2>/dev/null)
[ -n "$state" ] || state="unknown"

# speed z /sys zwykle jest w Mb/s; fallback 1000
speed_mbps=$(cat "/sys/class/net/$iface/speed" 2>/dev/null)
case "$speed_mbps" in
  ''|*[!0-9]*|-1) speed_mbps=1000 ;;
esac

# bytes/s dla barów i truthful graph scale
link_bps=$((speed_mbps * 125000))

fmt_link() {
  s="$1"
  if [ "$s" -ge 1000 ] 2>/dev/null; then
    awk -v n="$s" 'BEGIN {
      g=n/1000;
      if (g == int(g)) printf "%dG", g;
      else printf "%.1fG", g;
    }'
  else
    printf "%sM" "$s"
  fi
}

fmt_rate() {
  v="$1"
  if [ "$v" -ge 1073741824 ] 2>/dev/null; then
    awk -v n="$v" 'BEGIN { printf "%.2f GB/s", n/1073741824 }'
  elif [ "$v" -ge 1048576 ] 2>/dev/null; then
    awk -v n="$v" 'BEGIN { printf "%.1f MB/s", n/1048576 }'
  elif [ "$v" -ge 1024 ] 2>/dev/null; then
    awk -v n="$v" 'BEGIN { printf "%.0f KB/s", n/1024 }'
  else
    printf "%s B/s" "$v"
  fi
}

rx1=$(cat "/sys/class/net/$iface/statistics/rx_bytes" 2>/dev/null || printf "0")
tx1=$(cat "/sys/class/net/$iface/statistics/tx_bytes" 2>/dev/null || printf "0")
sleep 1
rx2=$(cat "/sys/class/net/$iface/statistics/rx_bytes" 2>/dev/null || printf "0")
tx2=$(cat "/sys/class/net/$iface/statistics/tx_bytes" 2>/dev/null || printf "0")

rx=$((rx2 - rx1))
tx=$((tx2 - tx1))
[ "$rx" -lt 0 ] && rx=0
[ "$tx" -lt 0 ] && tx=0

# truthful 0..100 względem realnego linku
if [ "$link_bps" -le 0 ] 2>/dev/null; then
  rx_pct=0
  tx_pct=0
else
  rx_pct=$((rx * 100 / link_bps))
  tx_pct=$((tx * 100 / link_bps))
fi

[ "$rx_pct" -lt 0 ] && rx_pct=0
[ "$tx_pct" -lt 0 ] && tx_pct=0
[ "$rx_pct" -gt 100 ] && rx_pct=100
[ "$tx_pct" -gt 100 ] && tx_pct=100

link_label=$(fmt_link "$speed_mbps")

printf '{"net_ip":"%s","net_rx":"%s","net_tx":"%s","net_iface":"%s","net_gateway":"%s","net_state":"%s","net_link":"%s","net_rx_bps":"%s","net_tx_bps":"%s","net_link_bps":"%s","net_rx_pct":"%s","net_tx_pct":"%s","net_graph_scale":"%s"}' \
  "$ip4" "$(fmt_rate "$rx")" "$(fmt_rate "$tx")" "$iface" "$gw" "$state" "$link_label" "$rx" "$tx" "$link_bps" "$rx_pct" "$tx_pct" "$link_label"
'''
interval_ms = 2000

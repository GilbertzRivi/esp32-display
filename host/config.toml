# =============================================================================
# host/config.toml — konfiguracja hosta esp32-display
# =============================================================================

# -----------------------------------------------------------------------------
# [server] — adres i port serwera HTTP/WebSocket
# -----------------------------------------------------------------------------
[server]
host = "0.0.0.0"   # adres nasłuchu; "0.0.0.0" = wszystkie interfejsy
port = 1234

# -----------------------------------------------------------------------------
# [artifacts] — pliki serwowane jako /layout i /theme
# -----------------------------------------------------------------------------
[artifacts]
layout     = "layout.json"
theme      = "theme.json"
images_dir = "/home/gilbert/Documents/esp32-display/host/images/"

# =============================================================================
# [[sources]] — źródła danych dla placeholderów
#
# Każdy wpis [[sources]] definiuje jedno źródło i deklaruje placeholder(y)
# które aktualizuje. Device używa tych samych nazw w layout JSON jako "$nazwa".
#
# Wspólne pola:
#   placeholder   — nazwa klucza wysyłanego przez WebSocket (bez "$")
#   kind          — "builtin" (wbudowane) lub "command" (zewnętrzny proces)
#   interval_ms   — co ile ms odpytywać / jak często emitować dane
#
# Dla kind = "builtin":
#   metric        — nazwa metryki (patrz tabela poniżej)
#
# Dla kind = "command":
#   command       — polecenie sh -c "..."
#   mode          — "shot" | "push" | "pull"  (domyślnie: "shot")
#     shot  — uruchamia co interval_ms, czyta jeden wiersz stdout
#     push  — długo żyjący proces; każdy wiersz stdout = update (interval_ms ignorowane)
#     pull  — długo żyjący proces; co interval_ms zapisuje "\n" na stdin, czyta jeden wiersz stdout
#
# Jeśli stdout to JSON obiekt ({ "klucz": wartość, ... }), każdy klucz w obiekcie
# trafia jako osobny placeholder — "placeholder" nie ma wtedy znaczenia (ale musi być podane).
# Jeśli stdout to zwykły string, trafia pod "placeholder".
# =============================================================================

# =============================================================================
# BUILTIN — METRYKI CPU
# =============================================================================

# Globalne użycie CPU w % (0–100, bez miejsc dziesiętnych)
[[sources]]
placeholder  = "cpu_usage"
kind         = "builtin"
metric       = "cpu_percent"
interval_ms  = 1000

# Użycie pojedynczego rdzenia (0 = pierwszy rdzeń, 1 = drugi, itd.)
# Odkomentuj i powiel dla każdego rdzenia który chcesz pokazać.
# [[sources]]
# placeholder  = "cpu0_usage"
# kind         = "builtin"
# metric       = "cpu_0_percent"
# interval_ms  = 1000

# [[sources]]
# placeholder  = "cpu1_usage"
# kind         = "builtin"
# metric       = "cpu_1_percent"
# interval_ms  = 1000

# Temperatura CPU w °C (liczba całkowita)
# Linux: czyta lm-sensors (Tctl/Tdie/Package). Windows: nie obsługiwane (zwraca 0).
[[sources]]
placeholder  = "cpu_temp_c"
kind         = "builtin"
metric       = "cpu_temp_c"
interval_ms  = 2000

# =============================================================================
# BUILTIN — METRYKI RAM
# =============================================================================

# Użycie RAM w % (0–100, bez miejsc dziesiętnych)
[[sources]]
placeholder  = "ram_percent"
kind         = "builtin"
metric       = "ram_percent"
interval_ms  = 2000

# Użyta pamięć RAM w GB (np. "7.3")
[[sources]]
placeholder  = "ram_used"
kind         = "builtin"
metric       = "ram_used_gb"
interval_ms  = 2000

# Całkowita pamięć RAM w GB (np. "16.0") — zazwyczaj stała, duży interval OK
# [[sources]]
# placeholder  = "ram_total"
# kind         = "builtin"
# metric       = "ram_total_gb"
# interval_ms  = 60000

# =============================================================================
# BUILTIN — METRYKI DYSKU
# =============================================================================

# Użycie dysku systemowego w % (partycja / na Linux, C:\ na Windows)
[[sources]]
placeholder  = "disk_percent"
kind         = "builtin"
metric       = "disk_percent"
interval_ms  = 5000

# Użyte miejsce na dysku systemowym w GB (np. "142.7")
[[sources]]
placeholder  = "disk_used"
kind         = "builtin"
metric       = "disk_used_gb"
interval_ms  = 5000

# =============================================================================
# BUILTIN — SYSTEM
# =============================================================================

# Hostname maszyny (np. "gilbert-desktop")
[[sources]]
placeholder  = "host_name"
kind         = "builtin"
metric       = "hostname"
interval_ms  = 60000

# Skrócona wersja kernela, max 12 znaków
# Linux: np. "6.18.7-x64v3". Windows: np. "Windows 11"
[[sources]]
placeholder  = "kernel_short"
kind         = "builtin"
metric       = "kernel_short"
interval_ms  = 60000

# Czas pracy systemu w sekundach (liczba całkowita jako string)
# [[sources]]
# placeholder  = "uptime_s"
# kind         = "builtin"
# metric       = "uptime_s"
# interval_ms  = 10000

# Czas pracy systemu w formacie czytelnym (np. "2d 03h 14m" albo "5h 09m")
[[sources]]
placeholder  = "uptime_fmt"
kind         = "builtin"
metric       = "uptime_fmt"
interval_ms  = 10000

# =============================================================================
# BUILTIN — GPU (emituje JSON → wiele placeholderów naraz)
#
# Wykrywanie: NVIDIA przez NVML (Linux + Windows), AMD przez sysfs (Linux),
# AMD/Intel przez PDH + DXGI (Windows). Jeśli GPU nie wykryty — zwraca zera.
#
# Placeholder "gpu_usage" jest wpisem wyzwalającym; reszta pochodzi z JSON.
# Wszystkie poniższe placeholdery są aktualizowane tym samym wpisem [[sources]].
#
# Dostępne placeholdery:
#   gpu_usage     — użycie GPU w %  (np. "64")
#   gpu_temp_c    — temperatura GPU w °C (np. "71"); Windows bez NVML zwraca "N/A"
#   gpu_mem_used  — zajęta VRAM w GB (np. "4.2G")
# =============================================================================
[[sources]]
placeholder  = "gpu_usage"
kind         = "builtin"
metric       = "gpu_stats"
interval_ms  = 2000

# =============================================================================
# BUILTIN — SIEĆ (emituje JSON → wiele placeholderów naraz)
#
# Automatycznie wykrywa interfejs z domyślną trasą (ten który "wychodzi" do sieci).
# Dwa pomiary w odstępie 1s → prędkości jako delta bytes/s.
# Linux: czyta sysfs dla speed/gateway/operstate. Windows: używa wartości domyślnych.
#
# Placeholder "net_ip" jest wpisem wyzwalającym; reszta pochodzi z JSON.
# Wszystkie poniższe placeholdery są aktualizowane tym samym wpisem [[sources]].
#
# Dostępne placeholdery:
#   net_ip         — lokalny adres IPv4 (np. "192.168.1.42")
#   net_iface      — nazwa interfejsu (np. "eth0", "wlan0")
#   net_gateway    — adres bramy domyślnej (np. "192.168.1.1"); "-" jeśli nieznany
#   net_state      — operstate interfejsu (np. "up", "down"); Linux only
#   net_link       — prędkość łącza (np. "1G", "100M"); Windows default = "1G"
#   net_rx         — prędkość odbioru w formacie czytelnym (np. "1.2 MB/s")
#   net_tx         — prędkość wysyłania w formacie czytelnym (np. "456 KB/s")
#   net_rx_bps     — prędkość odbioru raw w bajtach/s (np. "1258291")
#   net_tx_bps     — prędkość wysyłania raw w bajtach/s (np. "467000")
#   net_link_bps   — pojemność łącza w bajtach/s (np. "125000000" dla 1G)
#   net_rx_pct     — % łącza zajęty przez RX (0–100)
#   net_tx_pct     — % łącza zajęty przez TX (0–100)
#   net_graph_scale — etykieta skali dla grafu (taka sama jak net_link, np. "1G")
# =============================================================================
[[sources]]
placeholder  = "net_ip"
kind         = "builtin"
metric       = "net_stats"
interval_ms  = 2000

# =============================================================================
# COMMAND — niestandardowe źródła danych
# =============================================================================

# Przykład: shot — wykonywane co interval_ms, jeden wiersz stdout
# [[sources]]
# placeholder  = "my_value"
# kind         = "command"
# mode         = "shot"
# command      = "sensors -j | jq -r '.[][\"Package id 0\"][\"temp1_input\"]'"
# interval_ms  = 3000

# Przykład: push — długo żyjący proces streamujący dane (np. co sekundę)
# [[sources]]
# placeholder  = "stream_value"
# kind         = "command"
# mode         = "push"
# command      = "while true; do date +%s; sleep 1; done"

# Przykład: pull — interaktywny daemon (host pisze "\n", daemon odpowiada jedną linią)
# [[sources]]
# placeholder  = "daemon_value"
# kind         = "command"
# mode         = "pull"
# command      = "/usr/local/bin/my-daemon"
# interval_ms  = 500

# Przykład: command emitujący JSON — aktualizuje wiele placeholderów naraz
# [[sources]]
# placeholder  = "_json"           # ignorowane gdy stdout to JSON obiekt
# kind         = "command"
# mode         = "shot"
# command      = "echo '{\"temp_gpu\":\"72\",\"fan_rpm\":\"1800\"}'"
# interval_ms  = 2000

# =============================================================================
# [[events]] — reakcje na eventy WebSocket z urządzenia
#
# Device wysyła {"event": "namespace.akcja"} gdy użytkownik dotknie widgetu
# z on_tap = "reply.namespace.akcja". Pasujący event uruchamia command.
#
# Pola:
#   event    — nazwa eventu (np. "spotify.next", "media.play")
#   command  — polecenie sh -c "..." do wykonania
# =============================================================================

# [[events]]
# event   = "spotify.next"
# command = "playerctl next"

# [[events]]
# event   = "spotify.prev"
# command = "playerctl previous"

# [[events]]
# event   = "spotify.toggle"
# command = "playerctl play-pause"

# [[events]]
# event   = "system.reboot"
# command = "systemctl reboot"